<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prospera POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #EDE7DA; }
      body { font-family: 'Inter', system-ui, sans-serif; color: #0B1129; -webkit-font-smoothing: antialiased; overflow: hidden; }
      .serif { font-family: 'Cormorant Garamond', serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      button { font-family: inherit; cursor: pointer; }
      input { font-family: inherit; }
      ::-webkit-scrollbar { width: 0; height: 0; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .screen { animation: fadeIn 0.32s cubic-bezier(.2,.7,.2,1); }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
